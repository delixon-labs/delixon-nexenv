name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - name: Rust cache
        uses: swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: npm ci

      # MSI no acepta pre-release identifiers no-numericos (ej. "beta.1").
      # Deteccion por forma del tag: si contiene "-" es prerelease (solo NSIS),
      # si no tiene "-" es release estable (todos los bundles incluyendo MSI).
      - name: Detect bundle targets
        id: bundles
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ "$TAG" == *-* ]]; then
            echo "args=-- --bundles nsis" >> $GITHUB_OUTPUT
            echo "Prerelease $TAG: NSIS only (MSI excluido por incompatibilidad con pre-release identifiers)"
          else
            echo "args=" >> $GITHUB_OUTPUT
            echo "Stable $TAG: all bundles (NSIS + MSI)"
          fi

      - name: Build Tauri installer
        run: npm run tauri build ${{ steps.bundles.outputs.args }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build CLI binary
        run: cargo build --manifest-path src-tauri/Cargo.toml --bin nexenv-cli --no-default-features --release

      # Rename: los wrappers npm/pip esperan nexenv-cli-{platform}-{arch}[.exe]
      - name: Rename CLI binary
        shell: bash
        run: cp src-tauri/target/release/nexenv-cli.exe src-tauri/target/release/nexenv-cli-win32-x64.exe

      - name: Upload release assets
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          draft: true
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/nexenv-cli-win32-x64.exe

  release-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - name: Rust cache
        uses: swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri installer
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build CLI binary
        run: cargo build --manifest-path src-tauri/Cargo.toml --bin nexenv-cli --no-default-features --release

      - name: Rename CLI binary
        run: cp src-tauri/target/release/nexenv-cli src-tauri/target/release/nexenv-cli-linux-x64

      - name: Upload release assets
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          draft: true
          files: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/nexenv-cli-linux-x64

  release-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - rust_target: aarch64-apple-darwin
            suffix: arm64
          - rust_target: x86_64-apple-darwin
            suffix: x64

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: "./src-tauri -> target"
          key: "${{ matrix.rust_target }}"

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri installer
        run: npm run tauri build -- --target ${{ matrix.rust_target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build CLI binary
        run: cargo build --manifest-path src-tauri/Cargo.toml --bin nexenv-cli --no-default-features --release --target ${{ matrix.rust_target }}

      - name: Rename CLI binary
        run: cp src-tauri/target/${{ matrix.rust_target }}/release/nexenv-cli src-tauri/target/${{ matrix.rust_target }}/release/nexenv-cli-darwin-${{ matrix.suffix }}

      - name: Upload release assets
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          draft: true
          files: |
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.rust_target }}/release/nexenv-cli-darwin-${{ matrix.suffix }}
