name: Publish pip

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 1.0.1)"
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      # `id-token: write` habilita OIDC para Trusted Publisher de PyPI.
      # PyPI valida la identidad del workflow contra el publisher configurado
      # en https://pypi.org/manage/account/publishing/ (delixon-labs/
      # delixon-nexenv + pip-publish.yml + environment production). Asi
      # publicamos sin tokens, sin secrets que rotar y sin riesgo de filtrado.
      #
      # `contents: write` para hacer commit + push del bump al repo tras
      # publish exitoso (ver step "Commit version bump"). Asi el
      # pyproject.toml queda alineado con la version publicada en PyPI.
      id-token: write
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # ref: local porque main esta protegida (require PR + enforce
          # admins) y el bot no puede pushear directo. local es la rama
          # de trabajo, sin restricciones. El owner promueve manual
          # local -> dev -> main siguiendo el flow estandar del repo.
          ref: local
          # fetch-depth: 0 para que el push funcione (con depth=1 el HEAD
          # queda detached y no permite push).
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v6.0.0
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade build

      - name: Update version in pyproject.toml
        working-directory: pip/cli
        # La version se pasa via env var (no interpolada en el script),
        # asi el input nunca se inyecta literalmente en el codigo Python.
        env:
          NEW_VERSION: ${{ github.event.inputs.version }}
        run: |
          python - <<'PY'
          import os, pathlib, re, sys
          v = os.environ["NEW_VERSION"]
          if not re.match(r"^[0-9]+(\.[0-9]+)+([.-][a-zA-Z0-9]+)*$", v):
              sys.exit(f"version invalida: {v!r}")
          p = pathlib.Path("pyproject.toml")
          text = p.read_text(encoding="utf-8")
          new = re.sub(
              r'^(version\s*=\s*)"[^"]*"',
              lambda m: f'{m.group(1)}"{v}"',
              text,
              count=1,
              flags=re.MULTILINE,
          )
          if new == text:
              sys.exit("version field not found in pyproject.toml")
          p.write_text(new, encoding="utf-8")
          PY

      - name: Build sdist and wheel
        working-directory: pip/cli
        run: python -m build

      - name: Publish nexenv (OIDC Trusted Publisher)
        # OIDC Trusted Publisher: PyPI valida la identidad del workflow via
        # JWT firmado por GitHub. Sin tokens, sin secrets rotables. Requiere
        # configuracion previa en pypi.org/manage/account/publishing/ con:
        #   - Owner: delixon-labs
        #   - Repository: delixon-nexenv
        #   - Workflow: pip-publish.yml
        #   - Environment: production
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc # v1.13.0
        with:
          packages-dir: pip/cli/dist

      - name: Commit version bump via REST API (server-signed)
        # Si el upload a PyPI fue exitoso, commiteamos el bump del
        # pyproject.toml a la rama `local` usando la REST API de GitHub
        # Contents (PUT /repos/{owner}/{repo}/contents/{path}). Este endpoint
        # crea el commit server-side y lo firma automaticamente con la web
        # flow key de GitHub (B5690EEEBB952194), asi llega ya verificado y
        # compatible con `required_signatures` en main cuando se promueve.
        #
        # No usamos `git commit` en shell porque el runner no tiene clave
        # SSH/GPG configurada → commit sin firma → bloqueo en main.
        #
        # Si el upload fallo, este step no corre por el default
        # `if: success()`.
        env:
          REPO: ${{ github.repository }}
          NEW_VERSION: ${{ github.event.inputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FILE_PATH: pip/cli/pyproject.toml
          BRANCH: local
        run: |
          set -euo pipefail
          NEW_CONTENT_B64=$(base64 -w0 < "${FILE_PATH}")
          REMOTE_META=$(gh api "repos/${REPO}/contents/${FILE_PATH}?ref=${BRANCH}")
          CURRENT_SHA=$(echo "${REMOTE_META}" | jq -r '.sha')
          REMOTE_CONTENT_B64=$(echo "${REMOTE_META}" | jq -r '.content' | tr -d '\n' | base64 -d | base64 -w0)
          if [ "${NEW_CONTENT_B64}" = "${REMOTE_CONTENT_B64}" ]; then
            echo "No changes to commit (pyproject.toml already at requested version)."
            exit 0
          fi
          gh api -X PUT "repos/${REPO}/contents/${FILE_PATH}" \
            -f "message=chore(pip): bump nexenv to ${NEW_VERSION} (auto)" \
            -f "content=${NEW_CONTENT_B64}" \
            -f "sha=${CURRENT_SHA}" \
            -f "branch=${BRANCH}"
