name: Publish npm

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.1.0)"
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      # `id-token: write` habilita OIDC: el job firma un JWT con la identidad
      # de este workflow y npm lo valida contra el "Trusted Publisher"
      # configurado en https://www.npmjs.com/package/@delixon/nexenv/access
      # (delixon-labs/delixon-nexenv + npm-publish.yml + environment production).
      # Asi publicamos sin tokens, sin OTP y sin secrets que rotar.
      #
      # `contents: write` para hacer commit + push del bump al repo tras
      # publish exitoso (ver step "Commit version bump"). Asi el package.json
      # queda alineado con la version publicada en npm.
      id-token: write
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # ref: local porque main esta protegida (require PR + enforce
          # admins) y el bot no puede pushear directo. local es la rama
          # de trabajo, sin restricciones de PR. El owner promueve manual
          # local -> dev -> main siguiendo el flow estandar del repo.
          ref: local
          # fetch-depth: 0 para que el push funcione (con depth=1 el HEAD
          # queda detached y no permite push).
          fetch-depth: 0

      - name: Setup Node.js
        # Node 24 (LTS) viene con npm >= 11, requerido para OIDC trusted
        # publishing. Node 22 viene con npm 10.x que NO soporta OIDC, y el
        # 'npm install -g npm@latest' falla en CI con MODULE_NOT_FOUND
        # (promise-retry) por self-update race condition. Bajar/subir
        # version de Node es el camino limpio.
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Update version
        working-directory: npm/cli
        run: npm version ${{ github.event.inputs.version }} --no-git-tag-version

      - name: Publish @delixon/nexenv
        working-directory: npm/cli
        # --provenance agrega un attestation firmado al paquete: los usuarios
        # ven en npm que el .tgz fue compilado por este workflow exacto desde
        # este repo, no inyectado por un atacante con un token filtrado.
        run: npm publish --access public --provenance

      - name: Commit version bump via REST API (server-signed)
        # Si la publicacion fue exitosa, commiteamos el bump del package.json
        # a la rama `local` usando la REST API de GitHub Contents
        # (PUT /repos/{owner}/{repo}/contents/{path}). Este endpoint crea el
        # commit server-side y lo firma automaticamente con la web flow key
        # de GitHub (B5690EEEBB952194), asi llega ya verificado y compatible
        # con `required_signatures` en main cuando se promueve.
        #
        # No usamos `git commit` en shell porque el runner no tiene clave
        # SSH/GPG configurada → commit sin firma → bloqueo en main.
        #
        # Si la publicacion fallo, este step no corre por el default
        # `if: success()`.
        env:
          REPO: ${{ github.repository }}
          NEW_VERSION: ${{ github.event.inputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FILE_PATH: npm/cli/package.json
          BRANCH: local
        run: |
          set -euo pipefail
          NEW_CONTENT_B64=$(base64 -w0 < "${FILE_PATH}")
          REMOTE_META=$(gh api "repos/${REPO}/contents/${FILE_PATH}?ref=${BRANCH}")
          CURRENT_SHA=$(echo "${REMOTE_META}" | jq -r '.sha')
          REMOTE_CONTENT_B64=$(echo "${REMOTE_META}" | jq -r '.content' | tr -d '\n' | base64 -d | base64 -w0)
          if [ "${NEW_CONTENT_B64}" = "${REMOTE_CONTENT_B64}" ]; then
            echo "No changes to commit (package.json already at requested version)."
            exit 0
          fi
          gh api -X PUT "repos/${REPO}/contents/${FILE_PATH}" \
            -f "message=chore(npm): bump @delixon/nexenv to ${NEW_VERSION} (auto)" \
            -f "content=${NEW_CONTENT_B64}" \
            -f "sha=${CURRENT_SHA}" \
            -f "branch=${BRANCH}"
